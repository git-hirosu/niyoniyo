<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR Markerless AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.min.js"></script>
  
  <script>
    // タップした場所にモデルを配置する処理
    AFRAME.registerComponent('tap-place', {
      init: function () {
        this.raycaster = new THREE.Raycaster();
        this.camera = document.querySelector('[camera]');
        this.el.sceneEl.addEventListener('click', (event) => {
          // タップ位置にモデルを移動させる（hit-testの結果を使用）
          const model = document.querySelector('#model');
          model.setAttribute('visible', 'true');
          model.setAttribute('position', this.el.getAttribute('position'));
        });
      }
    });
  </script>
</head>
<body>
  <a-scene webxr="requiredFeatures: hit-test, local-floor;" 
           xrweb>
    
    <a-assets>
      <a-asset-item id="my-model" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <a-entity id="target" tap-place></a-entity>
    
    <a-entity id="model" 
              gltf-model="#my-model" 
              scale="0.5 0.5 0.5" 
              visible="false">
    </a-entity>

  </a-scene>
</body>
</html>
